<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NJK Pharmacy - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a5c2a 0%, #0d3318 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #fff;
            border-radius: 20px;
            padding: 45px 40px;
            width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #1a5c2a, #7dcea0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
            color: white;
        }
        .login-card h3 {
            text-align: center;
            color: #1a5c2a;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .login-card p {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-bottom: 30px;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            font-size: 14px;
        }
        .form-control:focus {
            border-color: #1a5c2a;
            box-shadow: 0 0 0 3px rgba(26,92,42,0.1);
        }
        .btn-login {
            background: linear-gradient(135deg, #1a5c2a, #2ecc71);
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-size: 15px;
            font-weight: 600;
            width: 100%;
            color: white;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26,92,42,0.3);
        }
        .input-group-text {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-right: none;
            border-radius: 10px 0 0 10px;
            color: #1a5c2a;
        }
        .input-group .form-control { border-left: none; border-radius: 0 10px 10px 0; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-icon"><i class="fas fa-clinic-medical"></i></div>
    <h3>NJK Pharmacy</h3>
    <p>Nawab Jassi Khan Medical Store</p>

    {% if error %}
    <div class="alert alert-danger rounded-3 py-2 text-center" style="font-size:13px;">
        <i class="fas fa-exclamation-circle me-1"></i> {{ error }}
    </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label fw-600" style="color:#333; font-size:14px;">Admin Username</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-user"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label" style="color:#333; font-size:14px;">Password</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
        </div>
        <button type="submit" class="btn-login">
            <i class="fas fa-sign-in-alt me-2"></i> LOGIN
        </button>
    </form>
</div>
</body>
</html>
