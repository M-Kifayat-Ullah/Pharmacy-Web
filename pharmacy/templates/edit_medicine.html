{% extends 'base.html' %}
{% block page_title %}Edit Medicine{% endblock %}
{% block page_icon %}edit{% endblock %}

{% block content %}
<div class="card p-4" style="max-width: 700px;">
    <h6 class="fw-bold mb-4" style="color:#1a5c2a;">
        <i class="fas fa-edit me-2"></i>Edit Medicine
    </h6>
    <form method="POST">
        {% csrf_token %}
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label fw-semibold">Medicine Name</label>
                <input type="text" name="name" class="form-control" 
                       value="{{ medicine.name }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Batch Number</label>
                <input type="text" name="batch_number" class="form-control" 
                       value="{{ medicine.batch_number }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Expiry Date</label>
                <input type="date" name="expiry_date" class="form-control" 
                       value="{{ medicine.expiry_date }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Quantity</label>
                <input type="number" name="quantity" class="form-control" 
                       value="{{ medicine.quantity }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Buy Price (Rs.)</label>
                <input type="number" step="0.01" name="buy_price" 
                       class="form-control" value="{{ medicine.buy_price }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Sell Price (Rs.)</label>
                <input type="number" step="0.01" name="sell_price" 
                       class="form-control" value="{{ medicine.sell_price }}" required>
            </div>
        </div>
        <div class="mt-4 d-flex gap-3">
            <button type="submit" class="btn btn-warning px-4 text-white">
                <i class="fas fa-save me-2"></i>Update Medicine
            </button>
            <a href="{% url 'medicine_list' %}" class="btn btn-outline-secondary px-4">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
